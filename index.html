<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flava Catering | Tent, Chairs & Catering Equipment Hire in Narok</title>
<meta name="description" content="Flava Catering Narok - Tent, Chairs, Catering Equipment Hire. Call 0705 280365">
<meta name="keywords" content="flava catering narok, tent hire narok, chairs for hire, catering equipment kenya">
<meta name="author" content="Flava Catering">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --red: #FF0000;
    --white: #FFFFFF;
    --green: #228B22;
    --blue: #0066CC;
    --gold: #DAA520;
    --whatsapp: #25D366;
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', Arial, sans-serif; }
  body { background: var(--white); overflow:hidden; }

  #splash {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:var(--white); display:flex; flex-direction:column;
    justify-content:center; align-items:center; z-index:9999;
    animation: fadeOut 0.5s ease 3s forwards;
  }
  #splash h1 {
    color:var(--red); font-size:48px; font-weight:700;
    animation: zoomInOut 3s ease-in-out;
    letter-spacing:2px;
  }
  #splash p {
    color:var(--red); font-size:18px; font-weight:600;
    margin-top:15px; animation: zoomInOut 3s ease-in-out;
  }
  @keyframes zoomInOut {
    0% { transform:scale(0.5); opacity:0; }
    50% { transform:scale(1.1); opacity:1; }
    100% { transform:scale(1); opacity:1; }
  }
  @keyframes fadeOut {
    to { opacity:0; visibility:hidden; }
  }

  header {
    background: var(--red);
    color:var(--white); padding:20px; text-align:center;
    box-shadow:0 4px 10px rgba(255,0,0,0.3);
  }
  header img {
    height:55px; background:var(--white); padding:6px; border-radius:10px; margin-bottom:8px;
  }
  header h1 {
    color:var(--white); font-size:20px; font-weight:700; letter-spacing:1px;
  }

.container { padding:20px; max-width:1000px; margin:auto; }
.top-bar { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:25px; }

.tabs { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
.tab-btn {
  background:#ddd; color:#333; padding:14px; border:none; border-radius:12px; cursor:pointer;
  font-weight:700; font-size:14px; transition:0.2s;
}
.tab-btn.active { background:var(--red); color:var(--white); }

.btn {
  background:var(--red);
  color:var(--white); padding:16px; border:none; border-radius:15px; cursor:pointer;
  font-weight:700; font-size:16px; box-shadow:0 4px 10px rgba(255,0,0,0.3);
  transition:0.2s; width:100%;
}
.btn:hover { background:#CC0000; transform:scale(1.02); }
.btn-approve { background:var(--green); }
.btn-approve:hover { background:#1E7E1E; }
.btn-cancel { background:#888; }
.btn-cancel:hover { background:#666; }
.btn-return { background:var(--blue); }
.btn-return:hover { background:#0055aa; }
.btn-whatsapp { background:var(--whatsapp); }
.btn-whatsapp:hover { background:#1EBE57; }

.category {
  background:var(--white); margin:20px 0; border-radius:15px;
  box-shadow:0 3px 12px rgba(0,0,0,0.1); overflow:hidden;
}
.cat-header {
  color:var(--white); padding:16px; font-size:18px; font-weight:700;
  display:flex; justify-content:space-between; align-items:center;
}
.cat-header.green { background:var(--green); }
.cat-header.blue { background:var(--blue); }
.cat-header.gold { background:var(--gold); color:#333; }

table { width:100%; border-collapse:collapse; table-layout:fixed; }
th { background:#f8f8f8; padding:14px; text-align:left; font-size:14px; color:#333; font-weight:600; }
td { padding:14px; border-bottom:1px solid #eee; font-size:15px; }
.available { color:var(--green); font-weight:600; }.out { color:var(--red); font-weight:600; }
input, select { width:100%; padding:14px; border:2px solid #ddd; border-radius:12px; font-size:15px; margin:8px 0 15px 0; }
input:focus, select:focus { border-color:var(--red); outline:none; }
label { font-weight:600; font-size:14px; color:#333; }

.booking-card {
  background:var(--white); border:3px solid #ddd; padding:18px; margin:15px 0;
  border-radius:15px; box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.booking-card.pending { border-color:var(--gold); }
.booking-card.approved { border-color:var(--green); }
.booking-card.cancelled { border-color:#888; opacity:0.6; }
.booking-card.returned { border-color:var(--blue); opacity:0.7; }
.countdown { font-size:16px; font-weight:700; color:var(--red); margin-top:6px; }
.booking-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px; }

.booking-item { background:#f8f8f8; border:2px solid #ddd; border-radius:12px; padding:15px; margin:12px 0; }

.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000; padding:20px; }
.modal-content {
  background:var(--white); padding:25px; border-radius:18px; width:95%; max-width:600px;
  max-height:90vh; overflow-y:auto; margin:10px auto; border:3px solid var(--red);
}
.doc-modal {
  background:var(--white);
  padding:35px; width:95%; max-width:800px;
  border:4px solid var(--red);
}
.doc-header { text-align:center; border-bottom:3px solid var(--red); padding-bottom:18px; margin-bottom:20px; }
.doc-logo-img { max-width:200px; margin-bottom:10px; }
.doc-title { font-size:22px; margin-top:10px; font-weight:700; color:var(--red); }
.doc-info {
  display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:20px 0;
  padding:18px; background:#f8f8f8; border-radius:12px; border:2px solid #ddd;
}
.close { float:right; font-size:30px; cursor:pointer; color:var(--red); font-weight:700; }
.alert { padding:14px; margin:14px 0; border-radius:12px; text-align:center; font-weight:600; }
.alert-error { background:#ffe0e0; color:var(--red); }
.alert-success { background:#e8ffe8; color:var(--green); font-size:16px; }

.edit-btn { background:var(--white); color:#333; border:none; padding:10px 16px; font-size:13px; border-radius:10px; cursor:pointer; font-weight:700; }
.add-item-btn {
  background:var(--white); color:#333; border:none; padding:8px 14px; font-size:13px; border-radius:10px; cursor:pointer; font-weight:700; margin-right:8px;
}

  #loading { text-align:center; padding:60px; font-size:18px; color:var(--red); font-weight:700; }
.doc-table { width:100%; border-collapse:collapse; margin:20px 0; table-layout:fixed; }
.doc-table th { background:var(--red); color:var(--white); padding:12px; font-weight:700; }
.doc-table td { border:2px solid #eee; padding:12px; }

.page { display:none; }
.page.active { display:block; }
.back-btn { background:#888; }
.qty-edit { width:90px; display:inline-block; margin-right:10px; }
.name-edit { width:200px; display:inline-block; margin-right:10px; }
.pin-box { background:#f8f8f8; padding:18px; border-radius:12px; margin-bottom:18px; border:2px solid #ddd; }
.status-badge { padding:6px 12px; border-radius:20px; font-size:12px; font-weight:700; color:white; }
.status-pending { background:var(--gold); color:#333; }
.status-approved { background:var(--green); }
.status-cancelled { background:#888; }
.status-returned { background:var(--blue); }

@media print { .no-print { display:none; } }

@media print {
  .doc-table, .doc-table tr, .doc-table td, .doc-table th { break-inside: avoid !important; }
  .doc-table tr { page-break-inside: avoid !important; }
  .doc-table { page-break-inside: auto !important; }
  .doc-header, .doc-info { page-break-after: avoid !important; }
  thead { display: table-header-group; }
  tfoot { display: table-footer-group; }
}

/* PDF footer */
.pdf-footer {
  position: fixed;
  bottom: 18px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  color: #444;
}
</style>
</head>
<body>

<div id="splash">
  <h1>WELCOME</h1>
  <p>POWERED BY SIMES AGENCIES</p>
</div>

<header>
  <img src="logo.png" alt="FLAVA CATERING" onerror="this.style.display='none'">
  <h1>FLAVA CATERING</h1>
</header>

<div class="container">
  <div id="loading">Connecting to Cloud...</div>

  <div id="dashboardPage" class="page">
    <div id="mainApp" style="display:none;">
      <h2 style="color:var(--red); margin-bottom:20px; font-size:24px; font-weight:700;">My Site</h2>
      <div class="top-bar">
        <button class="btn" onclick="window.openModal('bookingModal')">New Event</button>
        <button class="btn" onclick="window.showPage('eventsPage')">View Events</button>
      </div>
      <h2 style="color:var(--red); margin-bottom:15px; font-size:22px; font-weight:700;">Current Stock - 200 Each</h2><div id="inventory"></div>
    </div>
  </div>

  <div id="eventsPage" class="page">
    <button class="btn back-btn" onclick="window.showPage('dashboardPage')">← Back to Dashboard</button>
    <h2 style="color:var(--red); margin:20px 0; font-size:22px; font-weight:700;">Events</h2>

    <div class="tabs">
      <button class="tab-btn active" onclick="window.filterEvents('pending', this)">Pending</button>
      <button class="tab-btn" onclick="window.filterEvents('ongoing', this)">Ongoing</button>
      <button class="tab-btn" onclick="window.filterEvents('done', this)">Done</button>
      <button class="tab-btn" onclick="window.filterEvents('all', this)">All</button>
    </div>

    <div id="activeBookings"></div>
  </div>
</div>

<div class="modal" id="addStockModal"><div class="modal-content"><span class="close" onclick="window.closeModal('addStockModal')">&times;</span><h2 style="color:var(--red); margin-bottom:15px;">Add New Item</h2><label>Category</label><input type="text" id="addCatName" readonly><label>Item Name</label><input type="text" id="itemName" placeholder="Enter new item name"><label>Qty to Add</label><input type="number" id="itemQty" min="1" value="1"><button class="btn" onclick="window.addEquipment()">Save to Stock</button></div></div>

<div class="modal" id="editPinModal"><div class="modal-content"><span class="close" onclick="window.closeModal('editPinModal')">&times;</span><h2 style="color:var(--red); margin-bottom:15px;">Authorization Required</h2><div class="pin-box"><label>Enter PIN</label><input type="password" id="pinInput"><input type="hidden" id="actionType"><input type="hidden" id="editCatName"></div><button class="btn" onclick="window.checkPin()">Unlock</button><div id="pinError" style="color:var(--red); margin-top:10px; font-weight:600;'></div></div></div>

<div class="modal" id="editCategoryModal"><div class="modal-content"><span class="close" onclick="window.closeModal('editCategoryModal')">&times;</span><h2 id="editCatTitle" style="color:var(--red); margin-bottom:15px;">Edit Category</h2><div id="editCatContent"></div><button class="btn" onclick="window.saveCategoryEdit()">Save All Changes</button></div></div>

<div class="modal" id="bookingModal"><div class="modal-content"><span class="close" onclick="window.closeModal('bookingModal')">&times;</span><h2 style="color:var(--red); margin-bottom:15px;">New Event Booking</h2><div id="bookingMessage"></div><label>Client Name</label><input type="text" id="clientName"><label>Client WhatsApp</label><input type="text" id="clientPhone" placeholder="0712345678"><small style="color:#666;">Format: 0712345678 or 254712345678</small><label>Event Name</label><input type="text" id="eventName"><label>Event Date</label><input type="date" id="eventDate"><div id="bookingForm"></div><button class="btn" onclick="window.submitBooking()">Submit Booking</button></div></div>

<div class="modal" id="pdfSignModal"><div class="modal-content"><span class="close" onclick="window.closeModal('pdfSignModal')">&times;</span><h2 style="color:var(--red); margin-bottom:15px;">PDF Details</h2><label>Prepared By</label><input type="text" id="preparedBy" placeholder="Staff Name"><label>Phone</label><input type="text" id="phoneNo" placeholder="0741437977"><button class="btn" onclick="window.downloadPDF()">Download PDF</button></div></div>

<div class="modal" id="docModal"><div class="doc-modal"><span class="close no-print" onclick="window.closeModal('docModal')">&times;</span><div id="docContent"></div><button class="btn no-print" onclick="window.openModal('pdfSignModal')">💾 Download PDF</button></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = { databaseURL: "https://simes1-abedd-default-rtdb.firebaseio.com" };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let equipment = {};
  let bookings = {};
  let currentEditCategory = '';
  let currentDocId = '';
  let currentAction = '';
  let currentFilter = 'pending';
  const PIN = "Flava";

  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    document.body.style.overflow = 'auto';
  }, 3500);

  const cateringItems = ["Plates - Plastic", "Plates - Executive", "Spoons", "Serving Spoon", "Panga", "Jiko", "Mwiko", "Washing Points", "Creater", "Knife", "Meat Log", "Pans", "Sufuria", "Basins", "Jiko Stands"];
  const eventItems = ["Tent - Corner", "Tent - Peak", "Tent - Joint / Bunduki", "Seats", "Connectors", "Leg Supports", "Straights", "Kamba"];
  const decoItems = ["Plastic Flowers", "Carpet", "Sheet - White", "Sheet - Red", "Sheet - Gold", "Sheet - Maroon", "Sheet - Blue", "Sheet - Green", "Sheet - Black", "Sheet - Purple", "Sheet - Pink", "Sheet - Orange"];

  onValue(ref(db, 'equipment'), (snapshot) => {
    equipment = snapshot.val() || {};
    if(Object.keys(equipment).length === 0) createDefaultStock();
    else { renderInventory(); showApp(); }
  });

  onValue(ref(db, 'bookings'), (snapshot) => {
    bookings = snapshot.val() || {};
    renderBookings();
  });

  function showApp(){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    window.showPage('dashboardPage');
  }

  window.showPage = function(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
  }

  function createDefaultStock() {
    let temp = {};
    [...cateringItems,...eventItems,...decoItems].forEach((name, i) => {
      let category = cateringItems.includes(name)? "Catering" : eventItems.includes(name)? "Event" : "Deco";
      temp[i] = {name, category, total: 200, out: 0};
    });
    set(ref(db, 'equipment'), temp);
  }

  function renderInventory() {
    const container = document.getElementById('inventory');
    container.innerHTML = '';
    const cats = [
      {name:"Catering", color:"green"},
      {name:"Event", color:"blue"},
      {name:"Deco", color:"gold"}
    ];
    cats.forEach(cat => {
      let tableRows = '';
      for(let id in equipment){
        let item = equipment[id];
        if(item.category!== cat.name) continue;
        const available = item.total - item.out;
        tableRows += `<tr><td><b>${item.name}</b></td><td>Total: ${item.total}</td><td class="available">Avail: ${available}</td><td class="out">Out: ${item.out}</td></tr>`;
      }
      if(tableRows) container.innerHTML += `
        <div class="category">
          <div class="cat-header ${cat.color}">
            ${cat.name}
            <div>
              <button class="add-item-btn" onclick="window.requestAction('add','${cat.name}')">+ Add Item</button>
              <button class="edit-btn" onclick="window.requestAction('edit','${cat.name}')">Edit</button>
            </div>
          </div>
          <table><thead><tr><th>Item</th><th>Total</th><th>Avail</th><th>Out</th></tr></thead><tbody>${tableRows}</tbody></table>
        </div>`;
    });
  }

  window.requestAction = function(action, category) {
    currentAction = action;
    document.getElementById('editCatName').value = category;
    document.getElementById('actionType').value = action;
    document.getElementById('pinInput').value = '';
    document.getElementById('pinError').innerText = '';
    window.openModal('editPinModal');
  }

  window.checkPin = function() {
    if(document.getElementById('pinInput').value === PIN) {
      currentEditCategory = document.getElementById('editCatName').value;
      currentAction = document.getElementById('actionType').value;
      window.closeModal('editPinModal');

      if(currentAction === 'edit') {
        window.openCategoryEdit(currentEditCategory);
      } else if(currentAction === 'add') {
        document.getElementById('addCatName').value = currentEditCategory;
        document.getElementById('itemName').value = '';
        document.getElementById('itemQty').value = '1';
        window.openModal('addStockModal');
      }
    } else {
      document.getElementById('pinError').innerText = 'Invalid PIN';
    }
  }

  window.openCategoryEdit = function(category) {
    document.getElementById('editCatTitle').innerText = `Edit ${category} Stock`;
    let content = '<p style="margin-bottom:15px; color:#333; font-weight:600;">Edit name and total for each item</p>';
    for(let id in equipment){
      if(equipment[id].category === category){
        content += `<div style="margin:15px 0;">
          <input type="text" class="name-edit" id="name_${id}" value="${equipment[id].name}">
          <input type="number" class="qty-edit" id="edit_${id}" value="${equipment[id].total}" min="0">
        </div>`;
      }
    }
    document.getElementById('editCatContent').innerHTML = content;
    window.openModal('editCategoryModal');
  }

  window.saveCategoryEdit = function() {
    for(let id in equipment){
      if(equipment[id].category === currentEditCategory){
        const newName = document.getElementById(`name_${id}`).value;
        const newQty = parseInt(document.getElementById(`edit_${id}`).value) || 0;
        if(newName) equipment[id].name = newName;
        if(newQty >= equipment[id].out) equipment[id].total = newQty;
      }
    }
    set(ref(db, 'equipment'), equipment);
    window.closeModal('editCategoryModal');
  }

  window.filterEvents = function(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderBookings();
  }

  function formatPhone(phone) {
    phone = phone.replace(/\D/g, '');
    if(phone.startsWith('0')) phone = '254' + phone.substring(1);
    if(!phone.startsWith('254')) phone = '254' + phone;
    return phone;
  }

  function sendWhatsApp(phone, message) {
    const formattedPhone = formatPhone(phone);
    const url = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
  }

  function renderBookings() {
    const container = document.getElementById('activeBookings');
    container.innerHTML = '';
    if(Object.keys(bookings).length === 0) { container.innerHTML = '<p style="text-align:center; color:#888;">No events yet</p>'; return; }

    const today = new Date();
    const sortedBookings = Object.entries(bookings).sort((a,b) => new Date(b[1].date) - new Date(a[1].date));

    let count = 0;
    sortedBookings.forEach(([id, b]) => {
      const eventDate = new Date(b.date);
      const diffDays = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));
      const isOngoing = b.status === 'approved';
      const isDone = b.status === 'returned' || b.status === 'cancelled';

      if(currentFilter === 'pending' && b.status!== 'pending') return;
      if(currentFilter === 'ongoing' &&!isOngoing) return;
      if(currentFilter === 'done' &&!isDone) return;

      count++;

      let status = '';
      let statusClass = '';
      if(b.status === 'cancelled') {
        status = 'CANCELLED'; statusClass = 'status-cancelled';
      } else if(b.status === 'returned') {
        status = 'RETURNED - DONE'; statusClass = 'status-returned';
      } else if(b.status === 'approved') {
        status = diffDays < 0? 'ONGOING' : diffDays === 0? 'ONGOING TODAY' : `${diffDays} days to go`;
        statusClass = 'status-approved';
      } else {
        status = diffDays < 0? 'PENDING - DATE PASSED' : diffDays === 0? 'PENDING - TODAY' : `PENDING - ${diffDays} days to go`;
        statusClass = 'status-pending';
      }

      let actionButtons = '';
      if(b.status === 'pending') {
        actionButtons = `
        <div class="booking-actions">
          <button class="btn btn-approve" onclick="window.approveBooking('${id}')">✓ Approve</button>
          <button class="btn btn-cancel" onclick="window.cancelBooking('${id}')">✕ Cancel</button>
        </div>`;
      } else if(b.status === 'approved') {
        actionButtons = `<button class="btn btn-return" onclick="window.returnBooking('${id}')">↩ Return Items</button>`;
      }

      container.innerHTML += `
      <div class="booking-card ${b.status}">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <h3 style="color:var(--red); font-size:18px;">${b.eventName}</h3>
          <span class="status-badge ${statusClass}">${b.status.toUpperCase()}</span>
        </div>
        <p><b>Client:</b> ${b.client}</p>
        <p><b>WhatsApp:</b> ${b.phone || 'N/A'}</p>
        <p><b>Date:</b> ${b.date}</p>
        <p class="countdown">${status}</p>
        <button class="btn btn-whatsapp" style="margin-top:10px;" onclick="window.sendManualWhatsApp('${id}')">💬 WhatsApp Client</button>
        <button class="btn" style="margin-top:10px;" onclick="window.preparePDF('${id}')">📄 View PDF</button>
        ${actionButtons}
      </div>`;
    });

    if(count === 0) container.innerHTML = '<p style="text-align:center; color:#888;">No events in this category</p>';
  }

  window.sendManualWhatsApp = function(id) {
    const b = bookings[id];
    const message = `Hi ${b.client}, \n\nThis is Flava Catering regarding your event: "${b.eventName}" on ${b.date}.\n\nThank you!`;
    sendWhatsApp(b.phone, message);
  }

  window.approveBooking = function(id) {
    if(!confirm('Approve this booking? Stock will be marked as OUT and WhatsApp will open.')) return;

    const b = bookings[id];
    for(let itemId in b.items) {
      equipment[itemId].out += b.items[itemId].qty;
    }
    update(ref(db, 'bookings/' + id), {status: 'approved'});
    set(ref(db, 'equipment'), equipment);

    const message = `Hi ${b.client}! \n\nYour booking for "${b.eventName}" on ${b.date} has been *APPROVED* ✅\n\nFlava Catering will contact you soon.\nThank you for choosing us!`;
    sendWhatsApp(b.phone, message);
  }

  window.cancelBooking = function(id) {
    if(!confirm('Cancel this booking? WhatsApp will open to notify client.')) return;
    const b = bookings[id];
    update(ref(db, 'bookings/' + id), {status: 'cancelled'});

    const message = `Hi ${b.client}, \n\nWe regret to inform you that your booking for "${b.eventName}" on ${b.date} has been *CANCELLED*.\n\nPlease contact us for more details.\nFlava Catering`;
    sendWhatsApp(b.phone, message);
  }

  window.returnBooking = function(id) {
    if(!confirm('Return all items from this event? Stock will be marked as IN and event will move to Done.')) return;

    const b = bookings[id];
    for(let itemId in b.items) {
      equipment[itemId].out -= b.items[itemId].qty;
      if(equipment[itemId].out < 0) equipment[itemId].out = 0;
    }
    update(ref(db, 'bookings/' + id), {status: 'returned'});
    set(ref(db, 'equipment'), equipment);

    const message = `Hi ${b.client}, \n\nAll equipment for "${b.eventName}" has been *RETURNED*. Thank you for using Flava Catering!`;
    sendWhatsApp(b.phone, message);

    alert('Items Returned! Stock updated and event moved to Done.');
  }

  window.preparePDF = function(id) {
    currentDocId = id;
    document.getElementById('preparedBy').value = '';
    document.getElementById('phoneNo').value = '';
    window.openModal('pdfSignModal');
  }

  window.downloadPDF = function() {
    const prepared = document.getElementById('preparedBy').value;
    const phone = document.getElementById('phoneNo').value;
    if(!prepared || !phone) { alert('Please fill both fields'); return; }
    window.closeModal('pdfSignModal');

    const b = bookings[currentDocId];
    if(!b) { alert('Booking not found'); return; }

    window.viewBookingDoc(currentDocId, prepared, phone);

    const docModal = document.getElementById('docModal');
    const element = document.getElementById('docContent');
    if(!docModal || !element) { alert('PDF content not ready'); return; }

    requestAnimationFrame(() => {
      docModal.style.display = 'flex';

      const opt = {
        margin: 0.35,
        filename: `Flava_Booking_${b.client}_${b.date}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale: 3,
          useCORS: true,
          backgroundColor: '#ffffff'
        },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'], avoid: ['tr'] }
      };

      html2pdf().set(opt).from(element).save().catch(err => {
        console.error(err);
        alert('PDF generation failed. Check console for details.');
      });
    });
  }

  window.viewBookingDoc = function(id, prepared='', phone='') {
    const b = bookings[id];
    let itemsRows = ''; let count = 1;
    for(let itemId in b.items){
      itemsRows += `<tr><td>${count++}</td><td>${b.items[itemId].name}</td><td>${b.items[itemId].qty}</td></tr>`;
    }

    document.getElementById('docContent').innerHTML = `
      <div class="doc-header">
        <img src="logo.png" class="doc-logo-img" onerror="this.style.display='none'">
        <p style="font-size:16px; color:#333; font-weight:600;"><b>Narok, Kenya | Tel: 0705 280365</b></p>
        <div class="doc-title">EQUIPMENT BOOKING SLIP</div>
        <p style="margin-top:10px; font-weight:600;">Status: ${b.status.toUpperCase()}</p>
      </div>
      <div class="doc-info">
        <p><b>Client:</b> ${b.client}</p>
        <p><b>WhatsApp:</b> ${b.phone || 'N/A'}</p>
        <p><b>Event:</b> ${b.eventName}</p>
        <p><b>Date:</b> ${b.date}</p>
      </div>
      <table class="doc-table">
        <thead>
          <tr><th>#</th><th>Item</th><th>Qty</th></tr>
        </thead>
        <tbody>${itemsRows}</tbody>
      </table>
      <div style="margin-top:40px; font-size:16px; padding-bottom:60px;">
        <p><b>Prepared By:</b> ${prepared}</p>
        <p><b>Phone:</b> ${phone}</p>
      </div>
      <p style="margin-top:20px; font-style:italic; color:#555;"><b>Notes:</b> All items must be returned in good condition after event.</p>

      <div class="pdf-footer">FLAVA NAROK</div>
    `;
    window.openModal('docModal');
  }

  function renderBookingForm() { /* unchanged */ }

  window.submitBooking = function() {
    const client = document.getElementById('clientName').value;
    const phone = document.getElementById('clientPhone').value;
    const event = document.getElementById('eventName').value;
    const date = document.getElementById('eventDate').value;
    const msgDiv = document.getElementById('bookingMessage');
    msgDiv.innerHTML = '';
    if(!client || !phone || !event || !date) { msgDiv.innerHTML = '<div class="alert alert-error">Please fill all details</div>'; return; }
    if(phone.length < 10) { msgDiv.innerHTML = '<div class="alert alert-error">Enter valid WhatsApp number: 0712345678</div>'; return; }

    let bookedItems = {};
    let hasError = false;
    for(let id in equipment){
      const input = document.getElementById(`qty_${id}`);
      if(input) {
        const requested = parseInt(input.value) || 0;
        const available = equipment[id].total - equipment[id].out;
        if(requested > available) { hasError = true; msgDiv.innerHTML += `<div class="alert alert-error">Not enough ${equipment[id].name}</div>`; }
        if(requested > 0) { bookedItems[id] = {name:equipment[id].name, qty:requested}; }
      }
    }
    if(Object.keys(bookedItems).length === 0) { msgDiv.innerHTML = '<div class="alert alert-error">Select at least 1 item</div>'; return; }

    if(!hasError) {
      push(ref(db, 'bookings'), {
        client,
        phone,
        eventName:event,
        date,
        items:bookedItems,
        status: 'pending',
        id: Date.now()
      });
      msgDiv.innerHTML = `<div class="alert alert-success">✅ Booking Submitted! Awaiting Approval</div>`;
      setTimeout(() => {
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('eventName').value = '';
        document.getElementById('eventDate').value = '';
        window.closeModal('bookingModal');
      }, 1500);
    }
  }

  window.addEquipment = function() {
    const name = document.getElementById('itemName').value;
    const category = document.getElementById('addCatName').value;
    const qty = parseInt(document.getElementById('itemQty').value) || 0;
    if(!category || !name || qty < 1) { alert('Fill all fields'); return; }

    const newId = Date.now();
    equipment[newId] = {name, category, total: qty, out: 0};
    set(ref(db, 'equipment'), equipment);
    window.closeModal('addStockModal');
  }

  window.openModal = function(id) {
    try {
      const el = document.getElementById(id);
      if(!el) { console.error('Modal not found:', id); return; }
      el.style.display = 'block';
      if(id === 'bookingModal') renderBookingForm();
    } catch (e) { console.error('openModal error:', e); }
  }

  window.closeModal = function(id) {
    const el = document.getElementById(id);
    if(el) el.style.display = 'none';
  }

  window.onclick = function(event) {
    if (event.target.classList.contains('modal')) { event.target.style.display = "none"; }
  }
</script>
</body>
</html>
